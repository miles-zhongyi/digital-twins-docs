name: Deploy Jupyter Book to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the book
        run: jupyter-book build . --warningiserror

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Copy logo for password page
        run: cp dodonaLogo.png _build/html/dodonaLogo.png

      - name: Password-protect the built site
        working-directory: _build
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: >-
          npx --yes staticrypt html -r -d encrypted --short --remember 7
          -c ../.staticrypt.json
          -t ../password_template.html
          --template-color-secondary "#000000"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/encrypted/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
