name: Deploy Jupyter Book to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify StatiCrypt password secret is configured
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::error::STATICRYPT_PASSWORD secret is not set. See CONFIDENTIALITY.md."
            exit 1
          fi

      - name: Annotate glossary terms in markdown
        run: python scripts/annotate_glossary.py

      - name: Build the book
        run: jupyter-book build . --warningiserror

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Copy assets for password page
        run: |
          cp dodonaLogo.png _build/html/dodonaLogo.png
          cp srsTwin_icon.png _build/html/srsTwin_icon.png

      - name: Password-protect the built site
        working-directory: _build
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: >-
          npx --yes staticrypt html -r -d encrypted --short --remember 7
          -c ../.staticrypt.json
          -t ../password_template.html
          --template-color-secondary "#ffffff"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/encrypted/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
